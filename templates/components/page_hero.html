<section class="page-hero{% if compact %} page-hero--compact{% endif %}">
    <div class="page-hero__overlay"></div>
    <div class="page-hero__content">
        {% if eyebrow %}
            <p class="eyebrow">{{ eyebrow }}</p>
        {% endif %}
        <h1>{{ title }}</h1>
        {% if subtitle %}
            <p>{{ subtitle }}</p>
        {% endif %}
    </div>
</section>
