{% extends "base.html" %}

{% block title %}Crear categoria{% endblock %}
{% block body_class %}center-page{% endblock %}

{% block page %}
<main class="form-card">
    <h1>Crear categoria</h1>
    <form method="post" class="app-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>
    <a href="{% url 'crear_menu' %}" class="back-link">Volver</a>
</main>
{% endblock %}
