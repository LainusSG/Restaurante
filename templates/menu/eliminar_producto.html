{% extends "base.html" %}

{% block title %}Eliminar producto{% endblock %}
{% block body_class %}center-page{% endblock %}

{% block page %}
<main class="form-card delete-card">
    <h1>Eliminar producto</h1>
    <p>Estas seguro de que deseas eliminar el producto <strong>{{ producto.nombre }}</strong>?</p>
    <form method="post" class="form-actions">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Si, eliminar</button>
        <a href="{% url 'crear_menu' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</main>
{% endblock %}
