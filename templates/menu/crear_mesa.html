{% extends "base.html" %}

{% block title %}Crear mesa{% endblock %}
{% block body_class %}center-page{% endblock %}

{% block page %}
<main class="form-card">
    <h1>Crear mesa</h1>
    <form method="post" class="app-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar mesa</button>
    </form>
    <a href="{% url 'listar_mesas' %}" class="back-link">Volver a mesas</a>
</main>
{% endblock %}
